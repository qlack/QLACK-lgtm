################################################
# QLACK LGTM Helm Chart Values
#
# This file defines default values for the Helm chart.
# It is a generic version suitable for public use.
################################################
# Global configuration applied across all sub-charts
global:
  # Kubernetes secrets used to authenticate with private container registries
  # Leave empty unless your environment requires private registry credentials.
  imagePullSecrets: []
################################################
# OpenTelemetry Collector Configuration
################################################
otelCollector:
  # Enable or disable OpenTelemetry Collector deployment
  enabled: true
  # Override the full name of the OpenTelemetry Collector resources
  fullnameOverride: "otel-collector"
  # Deployment mode: "deployment" for stateless collection, "daemonset" for per-node collection
  mode: "daemonset"
  # Container image configuration for the collector
  image:
    repository: "ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-k8s"
  # Binary name to execute inside the container
  command:
    name: "otelcol-k8s"
  # Presets are pre-configured feature sets that simplify common collection scenarios
  presets:
    # If it’s disabled, then the collector will NOT automatically scrape container stdout/stderr logs from the cluster.
    # You will still get logs only if: apps send logs to the collector via OTLP, and/or you enabled Kubernetes Events collection.
    # Needs mode: "DeamonSet"
    logsCollection:
      enabled: false
    # Configures the collector to collect host metrics.
    hostMetrics:
      enabled: true
    # Configures the Kubernetes Processor to add Kubernetes metadata.
    kubernetesAttributes:
      enabled: true
      extractAllPodLabels: true
      extractAllPodAnnotations: false
    # Configures the collector to collect node, pod, and container metrics from the API server on a kubelet.
    kubeletMetrics:
      enabled: true
    # Configures the collector to collect kubernetes events.
    kubernetesEvents:
      enabled: false
    # Configures the Kubernetes Cluster Receiver to collect cluster-level metrics.
    clusterMetrics:
      enabled: true
  # OpenTelemetry Collector pipeline configuration
  config:
    # Exporters define where telemetry data is sent
    exporters:
      # OTLP HTTP exporter to send logs to Loki
      otlphttp/loki:
        endpoint: http://loki:3100/otlp
        tls:
          insecure: true
      # OTLP HTTP exporter to send metrics to Mimir
      otlphttp/mimir:
        endpoint: http://mimir-gateway/otlp
      # OTLP HTTP exporter to send traces to Tempo
      otlphttp/tempo:
        endpoint: http://tempo:4318
    # Extensions provide additional capabilities like health checks
    extensions:
      # Health check endpoint for liveness/readiness probes
      health_check:
        endpoint: ${env:MY_POD_IP}:13133
    # Processors transform, filter, or enrich telemetry data
    processors:
      # Batch processor groups data before export for efficiency
      batch:
        timeout: 10s
        send_batch_size: 1000
        send_batch_max_size: 2000
      # Memory limiter prevents OOM by applying backpressure
      memory_limiter:
        check_interval: 5s
        limit_percentage: 80
        spike_limit_percentage: 25
    # Receivers define how telemetry data is ingested
    receivers:
      # Jaeger receiver for Jaeger-format traces (legacy)
      jaeger: {}
      # Zipkin receiver for Zipkin-format traces (legacy)
      zipkin: {}
      # Prometheus receiver for scraping Prometheus metrics
      prometheus: {}
      # OTLP receiver is the primary ingestion protocol
      otlp:
        protocols:
          # gRPC protocol on port 4317
          grpc:
            endpoint: ${env:MY_POD_IP}:4317
          # HTTP protocol on port 4318
          http:
            endpoint: ${env:MY_POD_IP}:4318
    # Service defines the telemetry pipelines
    service:
      telemetry: {}
      # Pipelines connect receivers, processors, and exporters
      pipelines:
        # Logs pipeline: OTLP -> batch -> Loki
        logs:
          exporters:
            - otlphttp/loki
          processors:
            - batch
            - memory_limiter
          receivers:
            - otlp
        # Metrics pipeline: OTLP -> batch -> Mimir
        metrics:
          exporters:
            - otlphttp/mimir
          processors:
            - batch
          receivers:
            - otlp
        # Traces pipeline: OTLP -> batch -> Tempo
        traces:
          exporters:
            - otlphttp/tempo
          processors:
            - batch
          receivers:
            - otlp
  service:
    enabled: true
    type: ClusterIP
  # Port configurations for the collector service
  ports:
    # OTLP gRPC port (primary protocol for modern apps)
    otlp:
      enabled: true
      containerPort: 4317
      servicePort: 4317
      # Enable hostPort if you do not enable service and need direct node access
      # hostPort: 4317
      protocol: TCP
      appProtocol: grpc
    # OTLP HTTP port (alternative to gRPC, easier for some clients)
    otlp-http:
      enabled: true
      containerPort: 4318
      servicePort: 4318
      # Enable hostPort if you do not enable service and need direct node access
      # hostPort: 4318
      protocol: TCP
    # Jaeger compact port (legacy, disabled by default)
    jaeger-compact:
      enabled: false
    # Jaeger thrift port (legacy, disabled by default)
    jaeger-thrift:
      enabled: false
    # Jaeger gRPC port (legacy, disabled by default)
    jaeger-grpc:
      enabled: false
    # Zipkin port (legacy, disabled by default)
    zipkin:
      enabled: false
    # Metrics port for collector self-monitoring
    metrics:
      # The collector self-metrics port is disabled by default. However you need to enable the port in order to use the ServiceMonitor (serviceMonitor.enabled) or PodMonitor (podMonitor.enabled).
      enabled: false
      containerPort: 8888
      servicePort: 8888
      protocol: TCP
  # Resource requests and limits for the collector pod
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
  # Liveness probe configuration to restart unhealthy pods
  livenessProbe:
    timeoutSeconds: 10
    failureThreshold: 5
  # Readiness probe configuration to control traffic routing
  readinessProbe:
    timeoutSeconds: 10
    failureThreshold: 5
#################################################
# Grafana Loki Configuration
##################################################
loki:
  # Enable or disable Loki deployment
  enabled: true
  # Override the full name of the Loki resources
  fullnameOverride: loki
  global:
    # -- Definitions to set up nginx resolver - Important to change if you are not using kube-dns or if your cluster domain is not cluster.local
    # DNS service name for resolving internal Kubernetes services
    dnsService: "kube-dns"
    # Namespace where the DNS service is located
    dnsNamespace: "kube-system"
    # Kubernetes cluster domain suffix
    clusterDomain: "cluster.local"
  # Image pull secrets for accessing private container registries
  # Leave empty unless your environment requires private registry credentials.
  imagePullSecrets: []
  # Deployment mode: Monolithic Loki is deployed as a single binary, useful for small installs typically without HA, up to a few tens of GB/day.
  deploymentMode: Monolithic
  # Loki server configuration
  loki:
    # Disable multi-tenancy (no X-Scope-OrgID required)
    auth_enabled: false
    # Storage configuration for logs
    storage:
      # Use local filesystem (not recommended for production at scale)
      type: filesystem
      filesystem:
        # Directory where log chunks are stored
        chunks_directory: /var/loki/chunks
        # Directory where alerting/recording rules are stored
        rules_directory: /var/loki/rules
    # Common configuration applied to multiple components
    commonConfig:
      # Replication factor for data (1 = no replication, suitable for single instance)
      replication_factor: 1
    # Schema configuration defines how logs are indexed and stored
    schemaConfig:
      configs:
        # Schema version active from this date forward
        - from: "2024-04-01"
          # TSDB index type (Time Series Database)
          store: tsdb
          # Object storage backend (filesystem in this case)
          object_store: filesystem
          # Schema version
          schema: v13
          index:
            # Index table prefix
            prefix: loki_index_
            # How often to rotate index tables
            period: 24h
    # Limits and performance tuning
    limits_config:
      # allow_structured_metadata allows Loki to index structured metadata from log entries, improving query capabilities on structured logs.
      allow_structured_metadata: true
      # volume_enabled allows Loki to use volume-based indexing
      volume_enabled: true
    # Compactor compacts index and applies retention policies
    compactor:
      # Enable automatic data deletion based on retention_period
      retention_enabled: true
      # Working directory for compaction operations
      working_directory: /var/loki/retention
      # How often to run compaction
      compaction_interval: 10m
      # Delay before deleting data (safety buffer)
      retention_delete_delay: 2h
      # Number of parallel workers for deletion
      retention_delete_worker_count: 150
      # Where to store delete requests
      delete_request_store: filesystem
    # Pattern ingester extracts patterns from logs automatically
    pattern_ingester:
      enabled: true
    # Ruler evaluates recording and alerting rules based on log data
    ruler:
      enable_api: true
    # Querier executes LogQL queries
    querier:
      # Maximum concurrent queries
      max_concurrent: 20
    # Ingester receives and processes incoming log streams
    ingester:
      # Compression algorithm for chunks
      chunk_encoding: snappy
  # SingleBinary component runs all Loki services in one process
  singleBinary:
    replicas: 1
    sidecar: false
    # Persistent storage for Loki data
    persistence:
      enabled: true
      accessModes:
        - ReadWriteOnce
      size: 10Gi
  # Gateway provides load balancing and routing (disabled in SingleBinary mode)
  gateway:
    enabled: false
  # Loki canary for monitoring Loki itself (disabled)
  lokiCanary:
    enabled: false
  # Cache for log chunks (disabled in SingleBinary mode)
  chunksCache:
    enabled: false
  # Cache for query results (disabled in SingleBinary mode)
  resultsCache:
    enabled: false
  # Test resources (disabled)
  test:
    enabled: false
  # Zero out replica counts of other deployment modes
  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0
  ingester:
    replicas: 0
  querier:
    replicas: 0
  queryFrontend:
    replicas: 0
  queryScheduler:
    replicas: 0
  distributor:
    replicas: 0
  compactor:
    replicas: 0
  indexGateway:
    replicas: 0
  bloomPlanner:
    replicas: 0
  bloomBuilder:
    replicas: 0
  bloomGateway:
    replicas: 0
##################################################
# Grafana Mimir Configuration
##################################################
mimir:
  # Enable or disable Mimir deployment
  enabled: true
  # Override the full name of the Mimir resources
  fullnameOverride: mimir
  global:
    # -- Definitions to set up nginx resolver
    # DNS service name for resolving internal Kubernetes services
    dnsService: kube-dns
    # Namespace where the DNS service is located
    dnsNamespace: kube-system
    # Kubernetes cluster domain suffix
    clusterDomain: cluster.local
  # Image configuration for Mimir
  image:
    # Image pull secrets for accessing private container registries
    # Leave empty unless your environment requires private registry credentials.
    pullSecrets: []
  # Mimir server configuration
  mimir:
    # Structured configuration using YAML (alternative to config file)
    structuredConfig:
      # When false, Mimir behaves like "single-tenant". You don't need X-Scope-OrgID, and everything is treated as one tenant.
      multitenancy_enabled: false
      # This defines where long-term blocks are stored (the "object store" in Mimir terms).
      # backend: filesystem is OK for dev/single-node and quick demos, but can be fragile for production.
      blocks_storage:
        # Use local filesystem as storage backend (alternative: s3, gcs, azure)
        backend: filesystem
        bucket_store:
          # Used by components that sync blocks from the "bucket" (store-gateway, querier).
          # Local directory used as a cache / sync working area.
          sync_dir: /data/tsdb-sync
        filesystem:
          # Root directory where blocks (and bucket-like layout) live when backend=filesystem.
          dir: /data/tsdb
        tsdb:
          # Directory where the ingester writes the active TSDB head (WAL + head chunks).
          # This should be on persistent storage for durability across restarts.
          dir: /data/tsdb-head
      # Compactor downloads blocks, compacts them, applies retention, and uploads back.
      # With filesystem backend, it reads/writes on the local filesystem bucket dirs.
      compactor:
        # Working directory for compaction operations
        data_dir: /data/compactor
        # Ring used when you scale compactor to multiple replicas (sharding ownership).
        sharding_ring:
          kvstore:
            # memberlist = gossip-based ring; no external KV (consul/etcd) needed.
            store: memberlist
      # This is the write path ingress. It receives remote_write and forwards samples to ingesters.
      distributor:
        # If set, limits how long distributor waits on upstreams; null uses defaults.
        remote_timeout: null
        # Ring where distributors discover ingesters (so they can shard/replicate writes).
        ring:
          kvstore:
            store: memberlist
      # Ingester holds recent samples in-memory + WAL on disk; flushes blocks to storage.
      ingester:
        ring:
          kvstore:
            store: memberlist
          # How many ingesters each sample is replicated to.
          # 1 which matches single-replica design.
          # If you ever scale ingesters >1 and want HA, set this to 2 or 3.
          replication_factor: 1
        # Keep the classic distributor -> ingester Push gRPC path enabled.
        # Required when Kafka ingest storage is disabled.
        push_grpc_method_enabled: true
      # This is Mimir's optional "Kafka ingest storage" pipeline.
      # Disabled means you are using the classic distributor->ingester push path.
      ingest_storage:
        enabled: false
        kafka:
          address: null
          topic: null
          auto_create_topic_default_partitions: null
      # HTTP server settings for Mimir components (the /ready and /metrics port).
      server:
        # Port for HTTP endpoints (queries, metrics, health checks)
        http_listen_port: 9009
        # Log level for Mimir components
        log_level: error
      # Store-gateway serves blocks from the object store for queries.
      store_gateway:
        # With >1 replica, store-gateways shard block ownership.
        # With 1 replica, this mostly doesn't matter.
        sharding_ring:
          # Replication factor for query path (1 = no replication)
          replication_factor: 1
      # Ruler evaluates recording and alerting rules
      ruler:
        # Directory inside the ruler pod where rules are staged/loaded.
        rule_path: /data/ruler
      # Where rule files are stored persistently.
      # filesystem backend means rules live on the pod's attached PV.
      # Good for simple setups; for HA, usually use object storage.
      ruler_storage:
        backend: filesystem
        filesystem:
          # Directory where ruler configuration files are stored
          # Directory where ruler configuration files are stored
          dir: /data/rules
  # Alertmanager component handles alert routing and notifications
  alertmanager:
    enabled: true
    # Number of alertmanager replicas (1 for simple setups)
    replicas: 1
    # Resource allocation for alertmanager pods
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
    # Persistent storage for alertmanager state
    persistentVolume:
      enabled: true
  # Distributor receives incoming metrics and forwards to ingesters
  distributor:
    # Number of distributor replicas (1 for simple setups)
    replicas: 1
    # Resource allocation for distributor pods
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
  # Ingester receives metrics from distributor and writes to storage
  ingester:
    # Number of ingester replicas (1 for simple setups)
    replicas: 1
    # Use StatefulSet for stable network identity and persistent storage
    statefulSet:
      enabled: true
    # Resource allocation for ingester pods
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
    # Persistent storage for ingester WAL and TSDB head
    persistentVolume:
      enabled: true
      name: storage
      size: 10Gi
    # Zone-aware replication for multi-zone HA (disabled for single zone)
    zoneAwareReplication:
      enabled: false
  # Overrides exporter exposes per-tenant limit configurations
  overrides_exporter:
    enabled: true
    # Number of overrides exporter replicas
    replicas: 1
    # Resource allocation for overrides exporter pods
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 100m
        memory: 128Mi
  # Ruler evaluates recording and alerting rules
  # Ruler evaluates recording and alerting rules
  ruler:
    enabled: true
    # If you run multiple rulers, you need sharding/coordination to avoid duplicate eval.
    replicas: 1
    # Resource allocation for ruler pods
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
    # Persistent storage for ruler state and rule files
    persistentVolume:
      enabled: true
      name: storage
      size: 5Gi
  # Querier executes PromQL queries against ingesters and store-gateways
  querier:
    enabled: true
    # Number of querier replicas (scale based on query load)
    replicas: 1
    # Keep revision history for rollback capability (null = default)
    revisionHistoryLimit: null
    # Resource allocation for querier pods
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
  # Frontend handles query splitting/caching/parallelization (especially useful at scale).
  query_frontend:
    enabled: true
    # Number of query frontend replicas
    replicas: 1
    # Resource allocation for query frontend pods
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
  # Scheduler coordinates query execution across queriers when you scale.
  query_scheduler:
    enabled: true
    # Number of query scheduler replicas
    replicas: 1
    # Resource allocation for query scheduler pods
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
  # Store-gateway serves historical data from long-term storage
  store_gateway:
    enabled: true
    # Number of store-gateway replicas
    replicas: 1
    # Resource allocation for store-gateway pods
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
    # Persistent storage for block index cache
    persistentVolume:
      enabled: true
      size: 20Gi
    # Zone-aware replication for multi-zone HA (disabled for single zone)
    zoneAwareReplication:
      enabled: false
  # Compactor merges smaller blocks into larger ones and applies retention
  compactor:
    enabled: true
    # Number of compactor replicas (typically 1 unless sharding)
    replicas: 1
    # Resource allocation for compactor pods
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
    # Persistent storage for compactor working directory
    persistentVolume:
      enabled: true
      name: storage
      size: 20Gi
  # Gateway (nginx) provides unified ingress for Mimir components
  gateway:
    nginx:
      config:
        # Disable IPv6 support in nginx configuration
        enableIPv6: false
  # MinIO object storage (disabled, using filesystem backend)
  minio:
    enabled: false
  # Chart can deploy Kafka (for ingest storage pipeline). Disabled since ingest_storage.enabled=false.
  kafka:
    enabled: false
  # Rollout Operator is enabled by default. It:
  # Coordinates ordered restarts of Mimir components
  # Ensures only safe numbers of pods restart at a time
  # Waits for components to become healthy before continuing
  # etc
  rollout_operator:
    enabled: true
##################################################
# Grafana Tempo Configuration
##################################################
tempo:
  # Enable or disable Tempo deployment
  enabled: true
  # Override the full name of the Tempo resources
  fullnameOverride: "tempo"
  # Single instance; pod restart can interrupt ingest briefly.
  replicas: 1
  # Tempo container image and resources configuration
  tempo:
    # Container image repository
    repository: grafana/tempo
    # Image tag (empty = use chart default)
    tag: ""
    # Image pull secrets for accessing private container registries
    # Leave empty unless your environment requires private registry credentials.
    pullSecrets: []
    # Resource allocation for Tempo pods
    resources:
      requests:
        cpu: 1000m
        memory: 4Gi
      limits:
        cpu: 2000m
        memory: 6Gi
    # Memory ballast helps stabilize Go garbage collection
    memBallastSizeMbs: 1024
    # Single-tenant mode (no X-Scope-OrgID required/used)
    multitenancyEnabled: false
    # Sends anonymous usage stats to Grafana Labs
    reportingEnabled: false
    # Metrics generator creates metrics from trace spans
    metricsGenerator:
      # Turns on "metrics from traces" inside Tempo (span metrics + service graphs)
      enabled: true
      # Where generated metrics are remote-written (Mimir ingest endpoint)
      remoteWriteUrl: "http://mimir-gateway/api/v1/push"
      # WAL storage for the metrics generator (local buffering before remote_write)
      storage:
        path: /tmp/tempo/
        # Prometheus remote_write configuration (Tempo forwards generated metrics here)
        remote_write:
          - url: "http://mimir-gateway/api/v1/push"
            # Include exemplars in remote write (links traces to metrics)
            send_exemplars: true
    # What protocols Tempo listens on for incoming traces
    receivers:
      # OpenTelemetry Protocol (OTLP) receiver
      otlp:
        protocols:
          # HTTP endpoint for receiving traces
          http:
            endpoint: "0.0.0.0:4318"
    # Trace storage configuration
    storage:
      trace:
        # Local filesystem backend (good for dev/smaller installs; not object storage)
        backend: local
        # Write-ahead log for durability before flushing to blocks
        wal:
          path: /var/tempo/wal
        # Local directory where trace blocks are stored
        local:
          path: /var/tempo/traces
    # Tempo HTTP API (Grafana datasource talks to this; also /metrics, /ready)
    server:
      # HTTP port for queries, metrics, and health checks
      http_listen_port: 3200
    # Per-tenant overrides for limits and features
    overrides:
      defaults:
        # Metrics generator configuration for the default tenant
        metrics_generator:
          # Which metrics-generator processors run on ingested traces
          processors:
            # Builds local blocks used by generator (required for some pipelines)
            - local-blocks
            # Produces service graph metrics (traces_service_graph_*)
            - service-graphs
            # Produces span-level metrics (traces_span_metrics_*)
            - span-metrics
  # Persistent storage for Tempo data
  persistence:
    enabled: true
    # Read/write access mode for single-node deployment
    accessModes:
      - ReadWriteOnce
    # Storage size for trace data
    size: 10Gi
##################################################
# Grafana Configuration
##################################################
grafana:
  # Enable or disable Grafana deployment
  enabled: true
  # Persist Grafana state so dashboards, users, and password changes survive pod recreation.
  persistence:
    enabled: true
    type: pvc
    accessModes:
      - ReadWriteOnce
    size: 10Gi
    # storageClassName: ""
  # ---------------------------------------------------------------------------
  # Dashboard provisioning
  # The umbrella chart ships one built-in dashboard (QLACK Observability Overview).
  # It is loaded via a ConfigMap that is created by helm/templates/grafana-dashboards-configmap.yaml.
  # To disable the built-in dashboard entirely, set:
  #   grafana.dashboards.qlackOverview.enabled: false
  # ---------------------------------------------------------------------------
  # Provider tells Grafana to look for .json files under a specific folder on disk.
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: qlack
          orgId: 1
          folder: "QLACK"
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/qlack
  # Maps the provider name above ("qlack") to the ConfigMap that contains the JSON files.
  # The ConfigMap is created by helm/templates/grafana-dashboards-configmap.yaml.
  dashboardsConfigMaps:
    qlack: "qlack-lgtm-dashboards"
  # Set the QLACK Overview dashboard as the default home dashboard shown after login.
  grafana.ini:
    dashboards:
      default_home_dashboard_path: /var/lib/grafana/dashboards/qlack/qlack-overview.json
  # Datasource configurations that are automatically provisioned on Grafana startup
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        # Loki datasource configuration for log aggregation and querying
        - uid: ef2aue8atucjkb
          orgId: 1
          name: Loki
          type: loki
          # proxy means Grafana server proxies requests (vs browser making direct requests)
          access: proxy
          # Internal Kubernetes service URL for Loki
          url: http://loki:3100
          basicAuth: false
          isDefault: false
          # Allow users to edit this datasource in Grafana UI
          editable: true
          jsonData:
            # Maximum number of log lines to display in query results
            maxLines: 1000
            # Custom HTTP header for multi-tenancy (if needed)
            httpHeaderName1: X-Scope-OrgID
          secureJsonData:
            # Value for the custom HTTP header (default tenant)
            httpHeaderValue1: default
        # Prometheus/Mimir datasource configuration for metrics storage and querying
        - uid: df2audk1iccg0e
          orgId: 1
          name: Prometheus
          type: prometheus
          access: proxy
          # Mimir gateway endpoint that provides Prometheus-compatible API
          url: http://mimir-gateway/prometheus
          basicAuth: false
          # Set as default datasource for Grafana dashboards
          isDefault: true
          editable: true
          jsonData:
            # Use POST for queries (better for large queries)
            httpMethod: POST
            # Specify that this is a Mimir backend (not standard Prometheus)
            prometheusType: Mimir
            prometheusVersion: 2.9.0
        # Tempo datasource configuration for distributed tracing
        - uid: af2auf35sokxsc
          orgId: 1
          name: Tempo
          type: tempo
          access: proxy
          # Internal Kubernetes service URL for Tempo
          url: http://tempo:3200
          basicAuth: false
          isDefault: false
          editable: true
          jsonData:
            # Configuration for correlating traces with logs in Loki
            tracesToLogsV2:
              # Reference to Loki datasource UID
              datasourceUid: ef2aue8atucjkb
              # Time range adjustment to find related logs before trace span start
              spanStartTimeShift: "-1h"
              # Time range adjustment to find related logs after trace span end
              spanEndTimeShift: "1h"
              # Whether to filter logs by trace ID
              filterByTraceID: false
              # Whether to filter logs by span ID
              filterBySpanID: false
            # Configuration for correlating traces with metrics in Mimir/Prometheus
            tracesToMetrics:
              # Reference to Prometheus/Mimir datasource UID
              datasourceUid: df2audk1iccg0e
            # Service map visualization using metrics from traces
            serviceMap:
              # Reference to Prometheus/Mimir datasource UID for service map data
              datasourceUid: df2audk1iccg0e
            # Node graph visualization for trace relationships
            nodeGraph:
              enabled: true
  # Ingress configuration for external access to Grafana
  ingress:
    # Disabled by default for public/generic installs. Enable and set your own host/TLS values if needed.
    enabled: false
    # Ingress controller class (nginx in this case)
    ingressClassName: nginx
    # Additional annotations for the ingress resource
    annotations: { }
    # Hostnames that route to Grafana
    hosts:
      - grafana.example.com
    # TLS/SSL configuration for HTTPS
    tls: []
  # Administrator credentials are read from an existing Kubernetes Secret.
  # Create the secret in the target namespace before deploying, for example:
  # kubectl -n lgtm create secret generic grafana-admin \
  #   --from-literal=admin-user=admin \
  #   --from-literal=admin-password='<strong-password>'
  admin:
    # If true, this chart will create the Secret referenced by existingSecret.
    create: false
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password
    # Used only when create=true.
    username: admin
    password: ""
  # Resource requests and limits for Grafana pod
  resources:
    limits:
      cpu: 400m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 128Mi
  # Init containers that run before Grafana starts
  # This ensures all backend datasources are ready before Grafana attempts to connect
  extraInitContainers:
    - name: wait-for-observability-stack
      # Lightweight curl image for health checks
      image: curlimages/curl:8.10.1
      imagePullPolicy: IfNotPresent
      command:
        - /bin/sh
        - -c
        - |
          set -eu

          # Wait for Loki to be ready
          echo "[wait] Checking Loki..."
          until curl -sS http://loki:3100/ready > /dev/null; do
            echo "[wait] Loki not ready yet, sleeping 5s"
            sleep 5
          done
          echo "[wait] Loki is ready."

          # Wait for Mimir to be ready
          echo "[wait] Checking Mimir..."
          # try query-frontend first because it's what Grafana will hit through /prometheus
          until curl -sSf http://mimir-gateway > /dev/null; do
            echo "[wait] Mimir not ready yet, sleeping 5s"
            sleep 5
          done
          echo "[wait] Mimir is ready."

          # Wait for Tempo to be ready
          echo "[wait] Checking Tempo..."
          # Tempo readiness endpoint is /ready on the HTTP/querier port, which in your config is exposed via Service on 3200
          until curl -sSf http://tempo:3200/ready > /dev/null; do
            echo "[wait] Tempo not ready yet, sleeping 5s"
            sleep 5
          done
          echo "[wait] Tempo is ready."

          echo "[wait] All backends are ready. Unblocking Grafana startup."
      # Resource allocation for the init container
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi